server {
    listen 80;
    server_name _;

    # Frontend static files
    root /var/www/aws-cost-dashboard;
    index index.html;

    # Backend API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://127.0.0.1:5000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
